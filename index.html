<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yours</title>

<style>

*{
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    margin:0;
    min-height:100vh;
    background:
    radial-gradient(circle at top, white, #f5d76e, #c99b16);
}


/* الهيدر */

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 50px;
    color:#7a5700;
}


.logo{
    font-size:40px;
    font-weight:bold;
}


/* العربة */

.cart-btn{
    background:#c99b16;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:30px;
    cursor:pointer;
    font-size:18px;
}


.cart-box{
    display:none;
    position:absolute;
    right:40px;
    top:90px;
    background:white;
    width:300px;
    border-radius:20px;
    padding:20px;
    box-shadow:0 15px 30px #0004;
    z-index:5;
}


.cart-box li{
    list-style:none;
    padding:10px;
    border-bottom:1px solid #ddd;
}


/* المنتجات */

.products{

    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:25px;
    padding:40px;

}


.card{

    background:white;
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:0 15px 30px #0003;

    animation:float 3s infinite ease-in-out;

}


@keyframes float{

    50%{
        transform:translateY(-10px);
    }

}



.card img{

    width:100%;
    height:230px;
    object-fit:cover;
    border-radius:20px;

}


.card h2{

    color:#7a5700;

}


.price{

    font-size:22px;
    font-weight:bold;
    color:#c99b16;

}


.add{

    background:#c99b16;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;

}


.add:hover{

    background:#8b6508;

}



@media(max-width:900px){

.products{

grid-template-columns:repeat(2,1fr);

}

}


</style>

</head>


<body>


<header>

<div class="logo">
Yours ✨
</div>


<button class="cart-btn" onclick="openCart()">
🛒 Cart
</button>


<div class="cart-box" id="cart">

<h3>Your Cart</h3>

<ul id="items"></ul>

<p>
Total: <span id="total">0</span>
</p>

</div>


</header>



<section class="products">



<div class="card">

<img src="images/shampoo.jpg">

<h2>Shampoo</h2>

<p class="price">800</p>

<button class="add" onclick="addItem('Shampoo',800)">
Add to Cart
</button>

</div>




<div class="card">

<img src="images/conditioner.jpg">

<h2>Conditioner</h2>

<p class="price">800</p>

<button class="add" onclick="addItem('Conditioner',800)">
Add to Cart
</button>

</div>




<div class="card">

<img src="images/hairmask.jpg">

<h2>Hair Mask</h2>

<p class="price">800</p>

<button class="add" onclick="addItem('Hair Mask',800)">
Add to Cart
</button>

</div>




<div class="card">

<img src="images/serum.jpg">

<h2>Serum</h2>

<p class="price">550</p>

<button class="add" onclick="addItem('Serum',550)">
Add to Cart
</button>

</div>



</section>




<script>


let total = 0;


function openCart(){

let cart=document.getElementById("cart");

if(cart.style.display==="block"){

cart.style.display="none";

}

else{

cart.style.display="block";

}

}



function addItem(name,price){

let li=document.createElement("li");

li.innerHTML=name+" - "+price;

document.getElementById("items").appendChild(li);


total += price;

document.getElementById("total").innerHTML=total;

}



</script>


</body>
</html>
