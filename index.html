<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>متجري الذهبي</title>

<style>

*{
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    margin:0;
    background:
    linear-gradient(135deg,#b8860b,#ffd700,#8b6508);
    min-height:100vh;
}

/* العنوان */
header{
    text-align:center;
    color:white;
    padding:30px;
    font-size:35px;
    font-weight:bold;
    text-shadow:0 5px 10px #000;
}

/* المنتجات */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:30px;
}


.card{
    background:white;
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:
    0 15px 30px rgba(0,0,0,.3);
    transform:translateY(0);
    transition:.3s;
}

.card:hover{
    transform:translateY(-10px);
}


.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:20px;
}


.price{
    color:#b8860b;
    font-size:22px;
    font-weight:bold;
}


button{
    background:#d4af37;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    cursor:pointer;
    color:white;
    font-size:16px;
}


button:hover{
    background:#8b6508;
}


/* العربة */
.cart{
    position:fixed;
    left:20px;
    top:20px;
    width:300px;
    background:white;
    border-radius:25px;
    padding:20px;
    box-shadow:0 15px 30px #0005;
}


.cart h2{
    color:#b8860b;
}


#cartItems{
    padding:0;
}


#cartItems li{
    list-style:none;
    padding:10px;
    border-bottom:1px solid #ddd;
}

.total{
    font-size:20px;
    font-weight:bold;
}

</style>

</head>


<body>


<header>
✨ المتجر الذهبي ✨
</header>


<div class="cart">

<h2>🛒 العربة</h2>

<ul id="cartItems"></ul>

<div class="total">
الإجمالي: <span id="total">0</span> جنيه
</div>

</div>



<div class="products">


<div class="card">

<img src="images/product1.jpg">

<h3>المنتج الأول</h3>

<p class="price">100 جنيه</p>

<button onclick="addToCart('المنتج الأول',100)">
أضف للعربة 🛒
</button>

</div>



<div class="card">

<img src="images/product2.jpg">

<h3>المنتج الثاني</h3>

<p class="price">250 جنيه</p>

<button onclick="addToCart('المنتج الثاني',250)">
أضف للعربة 🛒
</button>

</div>



<div class="card">

<img src="images/product3.jpg">

<h3>المنتج الثالث</h3>

<p class="price">350 جنيه</p>

<button onclick="addToCart('المنتج الثالث',350)">
أضف للعربة 🛒
</button>

</div>


</div>



<script>

let total = 0;


function addToCart(name,price){

let item=document.createElement("li");

item.innerHTML=
name + " - " + price + " جنيه";


document.getElementById("cartItems")
.appendChild(item);


total += price;


document.getElementById("total")
.innerHTML=total;

}


</script>


</body>
</html>
