<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yours</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;

background:
radial-gradient(circle at top,#d4af37,#000 70%);

color:white;

min-height:100vh;

}


/* HEADER */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:30px 50px;

}


.logo{

font-size:45px;
font-weight:bold;

color:#ffd700;

text-shadow:0 5px 20px #ffd700;

}


.cart-btn{

background:#d4af37;

color:#000;

border:none;

padding:15px 30px;

border-radius:30px;

font-size:18px;

cursor:pointer;

font-weight:bold;

}



/* PRODUCTS */

.products{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:25px;

padding:40px;

}



.card{

background:linear-gradient(145deg,#111,#222);

border:1px solid #d4af37;

border-radius:25px;

padding:20px;

text-align:center;

box-shadow:0 15px 35px #000;

animation:move 3s infinite ease-in-out;

}



@keyframes move{

50%{

transform:translateY(-10px);

}

}



.card img{

width:100%;

height:230px;

object-fit:cover;

border-radius:20px;

}



.card h2{

color:#ffd700;

font-size:25px;

}



.size{

color:white;

font-size:16px;

}


.price{

color:#ffd700;

font-size:22px;

font-weight:bold;

}



.add{

background:#ffd700;

color:#000;

border:none;

padding:12px 25px;

border-radius:30px;

cursor:pointer;

font-weight:bold;

}



.add:hover{

transform:scale(1.05);

}





@media(max-width:900px){

.products{

grid-template-columns:repeat(2,1fr);

}

}


</style>

</head>



<body>



<header>

<div class="logo">
Yours ✨
</div>


<button class="cart-btn" onclick="showCart()">
🛒 Cart
</button>


</header>





<section class="products">



<div class="card">

<img src="images/shampoo.jpg">

<h2>Shampoo</h2>

<p class="size">
Size: 1 Liter
</p>

<p class="price">
Price: 800 EGP
</p>


<button class="add" onclick="addToCart('Shampoo',800)">
Add to Cart
</button>


</div>





<div class="card">

<img src="images/conditioner.jpg">

<h2>Conditioner</h2>

<p class="size">
Size: 1 Liter
</p>

<p class="price">
Price: 800 EGP
</p>


<button class="add" onclick="addToCart('Conditioner',800)">
Add to Cart
</button>


</div>





<div class="card">

<img src="images/hairmask.jpg">

<h2>Hair Mask</h2>

<p class="size">
Repair & Treatment
</p>

<p class="size">
Size: 500 ml
</p>

<p class="price">
Price: 800 EGP
</p>


<button class="add" onclick="addToCart('Hair Mask',800)">
Add to Cart
</button>


</div>





<div class="card">

<img src="images/serum.jpg">

<h2>Serum</h2>

<p class="size">
Size: 100 ml
</p>


<p class="price">
Price: 550 EGP
</p>


<button class="add" onclick="addToCart('Serum',550)">
Add to Cart
</button>


</div>



</section>
