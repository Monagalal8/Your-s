<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Luxury Hair Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* CSS الفاخر */
        :root { --bg: #121212; --gold: #C2A14A; --white: #FFFFFF; }
        body { background-color: var(--bg); color: var(--white); font-family: 'Poppins', sans-serif; margin: 0; }
        
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('your-image.jpg') no-repeat center/cover; }
        .hero h1 { font-family: 'Bodoni Moda', serif; font-size: 4rem; color: var(--gold); }
        
        .product-slider { display: flex; overflow-x: auto; padding: 50px; gap: 20px; }
        .product-card { min-width: 250px; border: 1px solid var(--gold); padding: 20px; transition: 0.3s; }
        .product-card:hover { transform: scale(1.05); }
        
        .cart-drawer { position: fixed; right: -300px; top: 0; width: 300px; height: 100%; background: #000; border-left: 1px solid var(--gold); transition: 0.5s; }
        .cart-drawer.active { right: 0; }
        
        footer { background: #000; border-top: 1px solid var(--gold); padding: 40px; text-align: center; color: var(--gold); }
    </style>
</head>
<body>

    <section class="hero">
        <div>
            <h1>Luxury Hair Care</h1>
            <p>جمال شعركِ يبدأ هنا</p>
        </div>
    </section>

    <div class="product-slider">
        <div class="product-card"><h3>Luxury Shampoo</h3><p>800 EGP</p></div>
        <div class="product-card"><h3>Luxury Conditioner</h3><p>800 EGP</p></div>
        <div class="product-card"><h3>Repair Mask</h3><p>800 EGP</p></div>
    </div>

    <div class="cart-drawer" id="cart">
        <h2 style="color: var(--gold); text-align: center;">سلة التسوق</h2>
        </div>

    <script>
        // كود بسيط لفتح وغلق السلة (يمكنك ربطه بزر)
        function toggleCart() {
            document.getElementById('cart').classList.toggle('active');
        }
    </script>
</body>
</html>
