<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOURS Luxury Hair Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* 1. Global & Variables */
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: #0b0b0b; color: white; font-family: Arial, sans-serif; overflow-x: hidden; }
        :root { --gold: #C5A059; --light: #E8C982; --dark-bg: #151515; }
        
        /* 2. Header & Nav */
        header { position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 20px 35px; background: #0b0b0b; border-bottom: 1px solid var(--gold); }
        .logo { font-family: 'Bodoni Moda', serif; font-size: 45px; letter-spacing: 12px; color: var(--gold); cursor: pointer; text-decoration: none; }
        nav a { color: white; text-decoration: none; margin: 10px; font-weight: bold; cursor: pointer; }
        nav a:hover { color: var(--gold); }
        .cart-btn { background: var(--gold); color: #111; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        /* 3. Hero & Banner */
        .hero { height: 75vh; display: flex; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 30px; }
        .hero h1 { font-family: 'Bodoni Moda', serif; font-size: 70px; color: var(--gold); margin: 0; }
        .hero p { font-size: 22px; max-width: 700px; line-height: 1.7; color: #ccc; }
        .gold-line { height: 3px; width: 170px; background: var(--gold); margin: 25px auto; }
        .btn { border: none; padding: 15px 40px; border-radius: 40px; background: linear-gradient(45deg, #8b672d, #C5A059, #f5dc99); font-weight: bold; cursor: pointer; color: #111; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(197,160,89,0.5); }

        /* 4. Carousels (Products & Bundles) */
        .section-title { font-family: 'Bodoni Moda', serif; color: var(--gold); font-size: 45px; text-align: center; margin: 60px 0 30px; }
        .luxury-section { padding: 40px 20px; max-width: 1200px; margin: auto; }
        .carousel-container { position: relative; overflow: hidden; width: 100%; padding: 20px 0; }
        .carousel-track { display: flex; gap: 25px; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding-bottom: 10px; }
        .carousel-track::-webkit-scrollbar { display: none; }
        
        /* Card Styling */
        .product-card { background: var(--dark-bg); border: 1px solid var(--gold); border-radius: 30px; padding: 25px; text-align: center; width: 280px; flex-shrink: 0; scroll-snap-align: start; cursor: pointer; transition: .4s; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 0 25px rgba(197,160,89,.4); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 20px; }
        .product-card h2 { font-size: 22px; color: #fff; margin: 15px 0 5px; }
        .product-card .price { color: var(--gold); font-size: 20px; font-weight: bold; margin: 10px 0; }
        .bundle-card { width: 100%; max-width: 500px; margin: auto; }

        /* 5. Hair Quiz */
        .quiz-container { max-width: 700px; margin: auto; background: var(--dark-bg); border: 2px solid var(--gold); border-radius: 30px; padding: 40px; text-align: center; }
        .quiz-step { display: none; }
        .quiz-step.active { display: block; }
        .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 30px 0; }
        .quiz-opt { background: #0b0b0b; border: 1px solid #444; padding: 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; font-size: 16px; font-weight: bold; }
        .quiz-opt:hover, .quiz-opt.selected { border-color: var(--gold); background: #1a1510; color: var(--light); }
        .result-box { display: none; border-top: 1px solid var(--gold); margin-top: 25px; padding-top: 25px; text-align: left; }
