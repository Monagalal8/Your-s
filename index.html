<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yours</title>

<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#ffffff,#f6d365,#d4af37);
min-height:100vh;
}


/* Header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 50px;
}

.logo{
font-size:40px;
font-weight:bold;
color:#8a6500;
}


.cart-btn{
background:#c89b19;
color:white;
border:none;
padding:15px 25px;
border-radius:30px;
cursor:pointer;
font-size:18px;
}


/* Cart */

.cart{
display:none;
position:absolute;
right:40px;
top:90px;
background:white;
width:320px;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px #0004;
z-index:10;
}


.cart li{
list-style:none;
padding:8px;
border-bottom:1px solid #ddd;
}


/* Products */

.products{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding:40px;

}


.card{

background:white;
border-radius:25px;
padding:20px;
text-align:center;
box-shadow:0 15px 30px #0003;
animation:move 3s infinite;

}


@keyframes move{

50%{
transform:translateY(-10px);
}

}


.card img{

width:100%;
height:220px;
object-fit:cover;
border-radius:20px;

}


h2{
color:#8a6500;
}


.price{

color:#c89b19;
font-size:22px;
font-weight:bold;

}


button{

background:#c89b19;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
cursor:pointer;

}


/* Checkout */

.checkout{

display:none;
background:white;
margin:30px;
padding:30px;
border-radius:25px;

}


input{

width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;

}


.contact{

text-align:center;
padding:30px;
font-size:20px;
color:#8a6500;

}



@media(max-width:900px){

.products{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>


<body>


<header>

<div class="logo">
Yours ✨
</div>


<button class="cart-btn" onclick="showCart()">
🛒 Cart
</button>


</header>



<div class="cart" id="cart">

<h2>Your Cart</h2>

<ul id="cartItems"></ul>

<p>
Total: <span id="total">0</span>
</p>

<button onclick="checkout()">
Checkout 🛍️
</button>

</div>




<div class="products">


<div class="card">

<img src="images/shampoo.jpg">

<h2>Shampoo</h2>

<p class="price">800</p>

<button onclick="add('Shampoo',800)">
Add to Cart
</button>

</div>



<div class="card">

<img src="images/conditioner.jpg">

<h2>Conditioner</h2>

<p class="price">800</p>

<button onclick="add('Conditioner',800)">
Add to Cart
</button>

</div>



<div class="card">

<img src="images/hairmask.jpg">

<h2>Hair Mask</h2>

<p class="price">800</p>

<button onclick="add('Hair Mask',800)">
Add to Cart
</button>

</div>



<div class="card">

<img src="images/serum.jpg">

<h2>Serum</h2>

<p class="price">550</p>

<button onclick="add('Serum',550)">
Add to Cart
</button>

</div>


</div>




<div class="checkout" id="checkout">


<h1>Complete Your Order</h1>


<input placeholder="Full Name">

<input placeholder="Email">

<input placeholder="Phone Number">


<input placeholder="Governorate">

<input placeholder="City / Area">

<input placeholder="Street Address">


<input placeholder="Building Number">

<input placeholder="Floor">

<input placeholder="Apartment Number">


<button>
Confirm Order ✅
</button>


</div>




<div class="contact">

📞 Contact Us:
<br>
YOUR PHONE NUMBER

</div>





<script>


let total=0;


function add(name,price){

let li=document.createElement("li");

li.innerHTML=name+" - "+price;

document.getElementById("cartItems")
.appendChild(li);


total+=price;

document.getElementById("total")
.innerHTML=total;

}



function showCart(){

let box=document.getElementById("cart");

if(box.style.display=="block"){

box.style.display="none";

}

else{

box.style.display="block";

}

}



function checkout(){

document.getElementById("checkout")
.style.display="block";

}



</script>



</body>
</html>
