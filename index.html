<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOURS Luxury Hair Care</title>
    <!-- مكتبة السلايدر -->
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        /* إضافة ستايل السلايدر */
        .swiper { width: 100%; padding: 20px 0; }
        .swiper-slide { display: flex; justify-content: center; }
        body { background: #0b0b0b; color: white; font-family: Arial, sans-serif; }
        .product-card { background: #151515; border: 1px solid #C5A059; border-radius: 30px; padding: 25px; text-align: center; width: 270px; cursor: pointer; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 20px; }
        .btn { background: #C5A059; color: white; padding: 15px 30px; border-radius: 30px; border: none; cursor: pointer; }
        .section-title { color: #C5A059; text-align: center; font-size: 40px; }
    </style>
</head>
<body>

<!-- قسم المنتجات بالسلايدر -->
<section class="luxury-section" id="products">
    <h2 class="section-title">Luxury Collection ✨</h2>
    <div class="swiper mySwiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><div class="product-card"><img src="images/shampoo.jpg"><h2>Luxury Shampoo</h2></div></div>
            <div class="swiper-slide"><div class="product-card"><img src="images/serum.jpg"><h2>Shine Serum</h2></div></div>
            <div class="swiper-slide"><div class="product-card"><img src="images/mask.jpg"><h2>Repair Mask</h2></div></div>
            <div class="swiper-slide"><div class="product-card"><img src="images/conditioner.jpg"><h2>Luxury Conditioner</h2></div></div>
        </div>
    </div>
</section>

<!-- قسم الدفع المحدث -->
<div class="checkout-box">
    <input id="customerName" placeholder="الاسم الكامل">
    <input id="customerPhone" placeholder="رقم الواتساب">
    <input id="customerAddress" placeholder="العنوان">
    
    <h3>طريقة الدفع 💳</h3>
    <select id="paymentMethod">
        <option value="Cash">كاش عند الاستلام 💵</option>
        <option value="InstaPay">إنستا باي 📲</option>
        <option value="Visa">فيزا (الدفع أونلاين) 💳</option>
    </select>
</div>

<!-- سكريبت السلايدر -->
<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script>
  var swiper = new Swiper(".mySwiper", {
    slidesPerView: 1,
    spaceBetween: 20,
    loop: true,
    autoplay: { delay: 4000, disableOnInteraction: false },
    breakpoints: { 768: { slidesPerView: 3 } }
  });
</script>

</body>
</html>
