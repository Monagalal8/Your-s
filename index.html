<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yours</title>


<style>

*{
    box-sizing:border-box;
    font-family: 'Arial', sans-serif;
}


body{

    margin:0;
    min-height:100vh;

    background:
    radial-gradient(circle at top left,#ffffff 10%,transparent 40%),
    radial-gradient(circle at bottom right,#ffe8a3 10%,transparent 45%),
    linear-gradient(135deg,#fff,#e8c45a,#fff3c4);

}



/* Header */

header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:30px 60px;

}


.logo{

    font-size:45px;
    font-weight:bold;

    color:#b8860b;

    text-shadow:
    0 5px 15px #b8860b55;

}



.cart-btn{

    background:linear-gradient(45deg,#b8860b,#ffd700);

    color:white;

    border:none;

    padding:15px 30px;

    border-radius:40px;

    font-size:18px;

    cursor:pointer;

    box-shadow:0 10px 20px #0003;

}





/* Products */

.products{

    display:grid;

    grid-template-columns:
    repeat(4,1fr);

    gap:30px;

    padding:40px 60px;

}





.card{

    background:
    rgba(255,255,255,.85);

    backdrop-filter:blur(10px);

    border-radius:30px;

    padding:25px;

    text-align:center;


    box-shadow:

    0 20px 40px #0003;


    animation:float 4s infinite ease-in-out;


}



@keyframes float{

    50%{

        transform:translateY(-12px);

    }

}





.card img{


    width:100%;

    height:240px;

    object-fit:cover;

    border-radius:25px;


}



.card h2{

    color:#8b6508;

    font-size:25px;

}



.price{

    color:#b8860b;

    font-size:24px;

    font-weight:bold;

}





.add{

    background:

    linear-gradient(45deg,#b8860b,#ffd700);

    color:white;

    border:none;

    padding:13px 30px;

    border-radius:30px;

    cursor:pointer;

    font-size:16px;

}



.add:hover{

    transform:scale(1.05);

}





@media(max-width:900px){

.products{

grid-template-columns:repeat(2,1fr);

}

}



</style>


</head>



<body>



<header>


<div class="logo">

Yours ✨

</div>


<button class="cart-btn">

🛒 Cart

</button>


</header>





<section class="products">



<div class="card">

<img src="images/shampoo.jpg">

<h2>Shampoo</h2>

<p class="price">800</p>

<button class="add">

Add to Cart

</button>


</div>





<div class="card">

<img src="images/conditioner.jpg">

<h2>Conditioner</h2>

<p class="price">800</p>

<button class="add">

Add to Cart

</button>


</div>






<div class="card">

<img src="images/hairmask.jpg">

<h2>Hair Mask</h2>

<p class="price">800</p>

<button class="add">

Add to Cart

</button>


</div>







<div class="card">

<img src="images/serum.jpg">

<h2>Serum</h2>

<p class="price">550</p>

<button class="add">

Add to Cart

</button>


</div>




</section>



</body>

</html>
<!-- CART -->

<div id="cartBox" style="
display:none;
position:fixed;
top:90px;
right:30px;
width:330px;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 15px 40px #0004;
z-index:20;
">

<h2 style="color:#b8860b;">Your Cart 🛒</h2>

<ul id="cartItems"></ul>

<h3>
Total:
<span id="total">0</span>
</h3>

<button class="add" onclick="openCheckout()">
Checkout 🛍️
</button>

</div>



<!-- CHECKOUT -->

<div id="checkout" style="

display:none;
margin:50px auto;
max-width:600px;
background:white;
padding:35px;
border-radius:30px;
box-shadow:0 20px 40px #0003;

">


<h1 style="color:#b8860b;">
Complete Your Order
</h1>


<input placeholder="Full Name"
style="width:100%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;">


<input placeholder="Email"
style="width:100%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;">



<input placeholder="Phone Number"
style="width:100%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;">



<input placeholder="Governorate"
style="width:100%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;">



<input placeholder="Area"
style="width:100%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;">



<input placeholder="City"
style="width:100%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;">



<input placeholder="Street Address"
style="width:100%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;">



<input placeholder="Building Number"
style="width:100%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;">



<input placeholder="Floor"
style="width:100%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;">



<input placeholder="Apartment Number"
style="width:100%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;">



<button class="add">
Confirm Order ✅
</button>


</div>





<script>


let cart=[];

let total=0;



// فتح العربة

document.querySelector(".cart-btn")
.onclick=function(){

let box=document.getElementById("cartBox");

if(box.style.display==="block"){

box.style.display="none";

}

else{

box.style.display="block";

}

};





// إضافة المنتجات

let buttons=document.querySelectorAll(".add");


buttons.forEach((button,index)=>{


button.onclick=function(){


let products=[

{name:"Shampoo",price:800},

{name:"Conditioner",price:800},

{name:"Hair Mask",price:800},

{name:"Serum",price:550}

];


if(index<4){

cart.push(products[index]);

total+=products[index].price;


let li=document.createElement("li");

li.innerHTML=
products[index].name+
" - "+
products[index].price;


document.getElementById("cartItems")
.appendChild(li);


document.getElementById("total")
.innerHTML=total;


}


}



});





function openCheckout(){


document.getElementById("checkout")
.style.display="block";


document.getElementById("checkout")
.scrollIntoView({

behavior:"smooth"

});


}



</script>
