<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>متجري</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f7f7f7;
}

header {
    background: #222;
    color: white;
    text-align: center;
    padding: 20px;
}

.products {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    width: 250px;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
}

.contact {
    background: white;
    text-align: center;
    padding: 20px;
}

#wheel {
    margin: 20px auto;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: conic-gradient(
    #ffb6c1, #ffd700, #90ee90, #87ceeb, #dda0dd, #ffb6c1
    );
    transition: 3s;
}
</style>

</head>

<body>

<header>
<h1>متجر منتجات الشعر</h1>
<p>منتجات عناية وترميم الشعر</p>
</header>


<h2 style="text-align:center;">المنتجات</h2>

<div class="products">

<div class="card">
<img src="shampoo.jpg">
<h3>شامبو</h3>
<p>800 جنيه للتر</p>
</div>

<div class="card">
<img src="conditioner.jpg">
<h3>بلسم</h3>
<p>800 جنيه للتر</p>
</div>

<div class="card">
<img src="mask.jpg">
<h3>ماسك ترميم ومعالج</h3>
<p>800 جنيه - 500 مللي</p>
</div>

<div class="card">
<img src="serum.jpg">
<h3>سيروم</h3>
<p>550 جنيه - 100 مللي</p>
</div>

</div>


<div class="contact">
<h2>للطلب والتواصل</h2>
<p>📞 +20 106 900 0231</p>
</div>


<h2 style="text-align:center;">🎡 عجلة الحظ</h2>

<div id="wheel"></div>

<center>
<button onclick="spin()">لف العجلة</button>
<h3 id="result"></h3>
</center>


<script>

function spin(){

let wheel = document.getElementById("wheel");

let number = Math.floor(Math.random()*2000)+1000;

wheel.style.transform = "rotate(" + number + "deg)";

setTimeout(function(){
document.getElementById("result").innerHTML =
"مبروك 🎉 حصلت على خصم!";
},3000);

}

</script>


</body>
</html>
