<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOURS Luxury Hair Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS الأساسي */
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; background: #0b0b0b; color: white; font-family: Arial, sans-serif; overflow-x: hidden; }
        :root { --gold: #C5A059; --light: #E8C982; }
        
        /* التصميم العام */
        header { position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 20px 35px; background: #0b0b0b; border-bottom: 1px solid var(--gold); }
        .logo { font-family: 'Bodoni Moda', serif; font-size: 35px; color: var(--gold); cursor: pointer; }
        .btn { border: none; padding: 15px 40px; border-radius: 40px; background: linear-gradient(45deg, #8b672d, #C5A059, #f5dc99); font-weight: bold; cursor: pointer; }
        .section-title { font-family: 'Bodoni Moda', serif; color: var(--gold); font-size: 40px; text-align: center; margin: 40px 0; }
        
        /* الكاروسيل */
        .carousel-wrapper { overflow-x: auto; display: flex; gap: 20px; padding: 20px; scroll-snap-type: x mandatory; }
        .product-card { min-width: 280px; background: #151515; border: 1px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; scroll-snap-align: center; }
        .product-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 15px; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #111; padding: 15px 30px; border-radius: 30px; display: none; z-index: 9999; }
    </style>
</head>
<body>

<header>
    <div class="logo">YOURS</div>
    <div onclick="openCart()">🛒 <span id="cartCount">0</span></div>
</header>

<section id="products">
    <h2 class="section-title">Luxury Collection</h2>
    <div class="carousel-wrapper">
        <div class="product-card" onclick="openProduct('shampoo')">
            <img src="images/48858f90-0195-4e8e-b818-90df3caf5966.jpeg">
            <h3>Luxury Shampoo</h3>
        </div>
        <div class="product-card" onclick="openProduct('conditioner')">
            <img src="images/be92c3e2-8ee4-44f3-a061-2696cffa14dd.jpeg">
            <h3>Conditioner</h3>
        </div>
        <div class="product-card" onclick="openProduct('mask')">
            <img src="images/4785b136-470d-4f4d-840d-7913682f61ac.jpeg">
            <h3>Hair Mask</h3>
        </div>
        <div class="product-card" onclick="openProduct('serum')">
            <img src="images/b5067912-6645-4d59-9b1f-d7c4882dc01e.jpeg">
            <h3>Shine Serum</h3>
        </div>
        <div class="product-card" onclick="openBundle()">
            <img src="images/80794169-cd17-4561-b558-2a3c4efc161a.jpeg">
            <h3>Complete Bundle</h3>
        </div>
    </div>
</section>

<div class="toast" id="toast">Added To Cart ✨</div>

<script>
    let cart = [];
    
    // تعريف المنتجات
    const products = {
        shampoo: { name: "Luxury Shampoo", price: 800 },
        conditioner: { name: "Conditioner", price: 800 },
        mask: { name: "Hair Mask", price: 800 },
        serum: { name: "Shine Serum", price: 550 }
    };

    function openProduct(type) {
        alert("عرض تفاصيل: " + products[type].name);
        // هنا يمكنك إضافة منطق فتح صفحة التفاصيل
    }

    function openBundle() {
        alert("عرض تفاصيل الباقة الكاملة");
    }

    function openCart() {
        alert("فتح حقيبة التسوق - المجموع: " + cart.length + " منتجات");
    }

    // صوت واهتزاز عند الإضافة
    function cartFeedback() {
        let toast = document.getElementById("toast");
        toast.style.display = "block";
        if(navigator.vibrate) navigator.vibrate(150);
        setTimeout(() => toast.style.display = "none", 2000);
    }

    // أوتوماتيك سكرول للكاروسيل كل 4 ثواني
    setInterval(() => {
        const wrapper = document.querySelector('.carousel-wrapper');
        if(wrapper.scrollLeft + wrapper.clientWidth >= wrapper.scrollWidth) wrapper.scrollLeft = 0;
        else wrapper.scrollLeft += 280;
    }, 4000);
</script>

</body>
</html>
